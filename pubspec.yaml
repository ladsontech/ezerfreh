name: ezer_fresh
description: "A new Flutter project for Ezer Fresh, a fruits and vegetables delivery service."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  flutter_riverpod: ^3.0.3
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  intl: ^0.20.2
  uuid: ^4.5.3
  image_picker: ^1.2.2
  curved_navigation_bar: ^1.0.6
  google_nav_bar: ^5.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0-dev.11
  custom_lint: ^0.5.11
  riverpod_lint: ^3.0.0-dev.4

flutter:
  uses-material-design: true
  assets:
    - assets/ezerlogo.png
    - assets/vegetables.png
    - assets/fruits.png
    - assets/herbs.png
    - assets/spices.png
    - assets/tent.png
