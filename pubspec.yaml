name: ezer_fresh
description: "A new Flutter project for Ezer Fresh, a fruits and vegetables delivery service."
publish_to: 'none'
version: 1.1.0+12

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  firebase_messaging: ^16.2.2
  flutter_riverpod: ^3.0.3
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  intl: ^0.20.2
  uuid: ^4.5.3
  image_picker: ^1.2.2
  curved_navigation_bar: ^1.0.6
  google_nav_bar: ^5.0.7
  rxdart: ^0.28.0
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.2
  cached_network_image: ^3.4.1
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.6.1
  riverpod_generator: ^3.0.3
  custom_lint: ^0.8.1
  riverpod_lint: ^3.0.3
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  web:
    generate: true
    image_path: "assets/ezerlogo.png"
  image_path: "assets/ezerlogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/ezerlogo.png
    - assets/vegetables.png
    - assets/fruits.png
    - assets/herbs.png
    - assets/spices.png
    - assets/tent.png
    - assets/banners/
    - assets/onboarding/
    - assets/status/
